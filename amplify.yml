version: 1
backend:
  phases:
    build:
      commands:
        - corepack enable
        - corepack prepare pnpm@9.12.0 --activate
        - pnpm install --filter '@helm/amplify...' --frozen-lockfile
        # Standard Amplify Gen 2 invocation: npx runs from cwd=repo root so
        # ampx finds amplify/backend.ts, and npx sets npm_config_user_agent
        # automatically so ampx detects the package manager. Pin the CLI
        # version to match what's in amplify/package.json.
        - npx --yes --package=@aws-amplify/backend-cli@1.8.2 ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        # corepack/pnpm may already be enabled from the backend phase; safe to re-run.
        - corepack enable
        - corepack prepare pnpm@9.12.0 --activate
        - pnpm install --filter '@helm/web...' --frozen-lockfile
    build:
      commands:
        # Vite reads VITE_* env vars at build time. The four required values
        # (VITE_API_URL, VITE_AWS_REGION, VITE_COGNITO_USER_POOL_ID,
        # VITE_COGNITO_USER_POOL_CLIENT_ID) must be set per branch in the
        # Amplify Console under App settings → Environment variables.
        - pnpm --filter @helm/web build
  artifacts:
    baseDirectory: apps/web/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - amplify/node_modules/**/*
      - apps/web/node_modules/**/*
